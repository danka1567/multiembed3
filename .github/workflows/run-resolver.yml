name: Run Stream Resolver Testing

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'The embed URL to resolve'
        required: false
        default: 'https://multiembed.mov/?video_id=45050&tmdb=1'
      args:
        description: 'Additional arguments (e.g., --no-live, --server-id 89)'
        required: false
        default: ''
      use_browser:
        description: 'Run with nodriver (--browser)'
        type: boolean
        default: true

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install dependencies (nodriver & Official Google Chrome)
        if: ${{ inputs.use_browser == true }}
        run: |
          python -m pip install --upgrade pip
          pip install nodriver
          
          # Install xvfb for the virtual display
          sudo apt-get update && sudo apt-get install -y xvfb wget gnupg
          
          # Download and install the official Google Chrome .deb package
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run script (Standard HTTP/Capture Mode)
        if: ${{ inputs.use_browser == false }}
        run: |
          python web_dev_learing_testing.py "${{ inputs.url }}" ${{ inputs.args }}

      - name: Run script (Browser Mode with nodriver)
        if: ${{ inputs.use_browser == true }}
        run: |
          xvfb-run python web_dev_learing_testing.py --browser "${{ inputs.url }}" ${{ inputs.args }}
