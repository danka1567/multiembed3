name: Run Stream Resolver Testing

on:
  # Allows you to manually run this workflow from the Actions tab
  workflow_dispatch:
    inputs:
      url:
        description: 'The embed URL to resolve'
        required: false
        default: 'https://multiembed.mov/?video_id=45050&tmdb=1'
      args:
        description: 'Additional arguments (e.g., --no-live, --server-id 89)'
        required: false
        default: ''
      use_browser:
        description: 'Run with Playwright (--browser)'
        type: boolean
        default: false

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # You can change this to match your local environment

      - name: Install dependencies (Playwright)
        if: ${{ inputs.use_browser == true }}
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chromium
          # Install xvfb to handle the hardcoded `headless=False` in your script
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run script (Standard HTTP/Capture Mode)
        if: ${{ inputs.use_browser == false }}
        run: |
          # Assuming your script is named web_dev_learing_testing.py
          python web_dev_learing_testing.py "${{ inputs.url }}" ${{ inputs.args }}

      - name: Run script (Browser Mode)
        if: ${{ inputs.use_browser == true }}
        # Because your script uses `headless=False`, it will crash on a headless CI server 
        # unless we wrap the command in `xvfb-run` to simulate a display.
        run: |
          xvfb-run python web_dev_learing_testing.py --browser "${{ inputs.url }}" ${{ inputs.args }}
